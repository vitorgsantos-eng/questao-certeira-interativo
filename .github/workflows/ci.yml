name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Lint, type-check, build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Build requires these vars to be defined (values are stubs — no real DB used).
          # RLS + service_role are not exercised at build time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          SESSION_SECRET: ci-placeholder-secret-at-least-32-characters

      - name: Validate content files
        run: npm run validate-content:ci

      - name: Run tests
        run: npm test
        env:
          SESSION_SECRET: ci-placeholder-secret-at-least-32-characters
